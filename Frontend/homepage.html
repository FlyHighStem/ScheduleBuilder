<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScheduleBuilder</title>
    <style>
        
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            height: 100vh;
        }

        
        .sidebar {
            width: 300px;
            background-color: #1e1e1e;
            padding: 30px 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            margin-top: 0;
            color: #bb86fc;
            margin-bottom: 10px;
        }

        /* Your Navigation Links */
        .nav-links {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .nav-links a {
            color: #bb86fc;
            text-decoration: none;
            margin-right: 15px;
            font-size: 0.9rem;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 0.9rem;
            color: #aaaaaa;
        }

        input[type="text"], input[type="date"], textarea {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #333;
            background-color: #2c2c2c; 
            color: white;              
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            background-color: #bb86fc;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #9b68eb;
        }

        /* Main Calendar Dashboard Area */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .calendar-header {
            margin-top: 0;
            font-size: 2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 15px;
            flex-grow: 1;
            margin-top: 20px;
        }

        .day-cell {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            min-height: 120px;
        }
        
        .day-name {
            text-align: center;
            font-weight: bold;
            color: #888;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Schedule Builder</h2>
        
        <div class="nav-links">
            <a href="saveduser.html">Log In</a>
            <a href="newuser.html">Create An Account</a>
        </div>

        <h3 style="margin-top: 0; color: white;">New Activity</h3>
        <form action="/add-activity" method="POST">
            <label for="activity">Activity Name</label>
            <input type="text" id="activity" name="activity_name" placeholder="e.g., Calculus Study Session" required>

            <label for="date">Date</label>
            <input type="date" id="date" name="activity_date" required>

            <label for="description">Description (Optional)</label>
            <textarea id="description" name="activity_description" placeholder="Add extra details here..."></textarea>

            <div class="checkbox-group">
                <input type="checkbox" id="urgent" name="is_urgent" value="true">
                <label for="urgent" style="color: white; font-size: 1rem;">Mark as Urgent</label>
            </div>

            <button type="submit">Add to Calendar</button>
        </form>
    </div>

    <div class="main-content">
        <h1 class="calendar-header">My Schedule</h1>
        
        <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; margin-top: 20px;">
            <div class="day-name">Sun</div>
            <div class="day-name">Mon</div>
            <div class="day-name">Tue</div>
            <div class="day-name">Wed</div>
            <div class="day-name">Thu</div>
            <div class="day-name">Fri</div>
            <div class="day-name">Sat</div>
        </div>

        <div class="calendar-grid">
            <div class="day-cell"></div>
            <div class="day-cell"></div>
            <div class="day-cell"></div>
            <div class="day-cell"></div>
            <div class="day-cell"></div>
            <div class="day-cell"></div>
            <div class="day-cell"></div>
        </div>
    </div>

</body>
</html>
