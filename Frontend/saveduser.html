<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="saveduserstyle.css" />
</head>
<body>
   <div class="text-box">
     <h1>Welcome Back!</h1>
     <p> Please log in using your email and password (case-sensitive)</p>
        <br>
        <p class="errormessage">
            The email and/or password are not correct. please try again!
        </p>
           
        <br>

       <form id="loginForm" action="/login" method="POST">
            
            <label for="email">Email</label>
             <input type="email" 
                id="email" 
                name="email" 
                placeholder="Enter your email" 
                />
 
             <br>

            <label for="password">Password</label>
            <input type="password" 
             id="password"
             name="password" 
             placeholder="Enter your password"
              />
             <a href = "fotgotpassword.css" class="forgotpass"> Forgot password?</a>

            <br>

              <button> Sign In</button>
        </form>
    </div>
    <script src="script.js"></script>


</body>
</html>
