<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="{{ url_for('static', path='/shared.css') }}">
  <title>Add Task</title>

<style>
    /* --- Base Page Styling --- */
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 120px; 
    }

    /* --- Form Container --- */
    .container {
      width: 100%;
      max-width: 500px;
      background-color: #1e1e1e; 
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      box-sizing: border-box; 
    }

    h1 {
      text-align: center;
      color: #c48afb; 
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 2rem;
      letter-spacing: -0.5px;
    }

    /* --- Form Elements --- */
    form {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 0.9rem;
      margin-bottom: 8px;
      margin-top: 20px;
      color: #a0a0a0; 
    }

    label:first-of-type {
      margin-top: 0;
    }

    input, textarea, select {
      background-color: #2d2d2d; 
      border: 1px solid transparent;
      color: #ffffff;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s ease;
      outline: none;
      box-sizing: border-box;
      width: 100%;
    }

    
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    input:focus, textarea:focus, select:focus {
      border-color: #c48afb;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* --- Button --- */
    .btn {
      margin-top: 30px;
      width: 100%;
      padding: 16px;
      background-color: #c48afb;
      color: #121212; 
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.2s ease;
      box-sizing: border-box;
      display: block; 
    }

    .btn:hover {
      background-color: #b070ef;
      transform: translateY(-2px); 
    }
  </style>
</head>
<body>
  {% include 'navbar.html' %}
  
  <div class="container">
    <h1>Add Task</h1>

    <form>
      <label for="name">Task Name</label>
      <input type="text" id="name" name="name" required placeholder="e.g., Study for Calculus">

      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="Add any extra details here..."></textarea>

      <label for="urgency">Urgency</label>
      <select id="urgency" name="urgency">
        <option value="none">None</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <label for="due">Due Date</label>
      <input type="date" id="due" name="due">

      <label for="time">Estimated Time (hours)</label>
      <input type="number" id="time" name="time" min="0" step="0.25" placeholder="0.00">

      <a href="/tasks" class="btn">Create Task</a>
    </form>
  </div>

</body>
</html>
