<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', path='/shared.css') }}?v=20260518-no-overlap">
  <link rel="stylesheet" href="{{ url_for('static', path='/calendar.css') }}?v=20260518-no-overlap">
  <title>Calendar</title>
</head>

<body>
{% include 'navbar.html' %}

<main class="calendar-page">
  <section class="calendar-toolbar">
    <div>
      <p class="small-label">Schedule</p>
      <h1 id="calendarTitle">Calendar</h1>
    </div>

    <div class="calendar-actions">
      <button type="button" class="nav-calendar-btn" id="previousPeriod">‹</button>
      <button type="button" class="today-btn" id="todayButton">Today</button>
      <button type="button" class="nav-calendar-btn" id="nextPeriod">›</button>
    </div>
  </section>

  <section class="view-tabs" aria-label="Calendar views">
    <button type="button" class="view-tab is-active" data-view="week">Week</button>
    <button type="button" class="view-tab" data-view="month">Month</button>
    <button type="button" class="view-tab" data-view="year">Year</button>
  </section>

  <section class="calendar-surface">
    <div id="calendarContent"></div>
  </section>
</main>

<script>
  const calendarTitle = document.getElementById("calendarTitle");
  const calendarContent = document.getElementById("calendarContent");
  let currentView = "week";
  let currentDate = new Date();

  function dateKey(date) {
    return formatDateValue(date);
  }

  function parseTaskDate(task) {
    return task.due ? new Date(`${task.due}T12:00:00`) : null;
  }

  function tasksForDate(date) {
    const key = dateKey(date);
    return getTasks().filter((task) => taskOccursOnDate(task, key));
  }

  function renderTaskPills(tasks) {
    if (!tasks.length) return "";
    return tasks.map((task) => `
      <div class="calendar-task ${task.category || "school"}">
        <strong>${task.name}</strong>
        <span>${getTaskTimeLabel(task)} • ${task.importance || "medium"}</span>
      </div>
    `).join("");
  }

  function renderWeek() {
    const start = new Date(currentDate);
    start.setDate(currentDate.getDate() - currentDate.getDay());
    calendarTitle.textContent = `Week of ${start.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })}`;

    const todayValue = getTodayValue();
    const days = getCurrentWeekDays(start);
    calendarContent.className = "week-schedule-scroll";
    calendarContent.innerHTML = "";

    const grid = document.createElement("div");
    grid.className = "week-schedule-grid";

    const headerBlank = document.createElement("div");
    headerBlank.className = "week-cell week-header week-time-header";
    headerBlank.style.gridColumn = "1";
    headerBlank.style.gridRow = "1";
    grid.appendChild(headerBlank);

    days.forEach((day, dayIndex) => {
      const header = document.createElement("div");
      header.className = `week-cell week-header${day.value === todayValue ? " is-today" : ""}`;
      header.style.gridColumn = String(dayIndex + 2);
      header.style.gridRow = "1";
      header.innerHTML = `
        <strong>${day.value === todayValue ? "Today" : day.weekday}</strong>
        <span>${day.date}</span>
      `;
      grid.appendChild(header);
    });

    for (let hour = 0; hour < 24; hour++) {
      const timeCell = document.createElement("div");
      timeCell.className = "week-cell week-time";
      timeCell.style.gridColumn = "1";
      timeCell.style.gridRow = String(hour + 2);
      timeCell.textContent = formatScheduleHour(hour);
      grid.appendChild(timeCell);

      days.forEach((day, dayIndex) => {
        const cell = document.createElement("div");
        cell.className = `week-cell week-slot${day.value === todayValue ? " is-today" : ""}`;
        cell.style.gridColumn = String(dayIndex + 2);
        cell.style.gridRow = String(hour + 2);
        grid.appendChild(cell);
      });
    }

    getTasks().forEach((task) => {
      const normalized = normalizeTaskTiming(task);
      days.forEach((day, dayIndex) => {
        if (!taskOccursOnDate(normalized, day.value)) return;

        const event = document.createElement("div");
        event.className = `calendar-task week-event schedule-block ${task.category || "school"}`;
        event.style.gridColumn = String(dayIndex + 2);
        event.style.gridRow = `${normalized.startHour + 2} / ${normalized.endHour + 2}`;
        event.innerHTML = `
          <strong>${task.name || task.title}</strong>
          <span>${getTaskTimeLabel(task)}</span>
        `;
        grid.appendChild(event);
      });
    });

    calendarContent.appendChild(grid);
  }

  function renderMonth() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const first = new Date(year, month, 1);
    const start = new Date(first);
    start.setDate(first.getDate() - first.getDay());

    calendarTitle.textContent = currentDate.toLocaleDateString("en-US", { month: "long", year: "numeric" });
    calendarContent.className = "month-view";
    calendarContent.innerHTML = "";

    ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].forEach((day) => {
      const header = document.createElement("div");
      header.className = "month-header";
      header.textContent = day;
      calendarContent.appendChild(header);
    });

    for (let i = 0; i < 42; i++) {
      const date = new Date(start);
      date.setDate(start.getDate() + i);
      const outsideMonth = date.getMonth() !== month;
      const cell = document.createElement("article");
      cell.className = `month-day${outsideMonth ? " is-muted" : ""}`;
      cell.innerHTML = `
        <span class="date-number">${date.getDate()}</span>
        <div class="day-tasks">${renderTaskPills(tasksForDate(date))}</div>
      `;
      calendarContent.appendChild(cell);
    }
  }

  function renderYear() {
    const year = currentDate.getFullYear();
    calendarTitle.textContent = String(year);
    calendarContent.className = "year-view";
    calendarContent.innerHTML = "";

    for (let month = 0; month < 12; month++) {
      const monthDate = new Date(year, month, 1);
      const monthTasks = getTasks().filter((task) => {
        const taskDate = parseTaskDate(task);
        return taskDate && taskDate.getFullYear() === year && taskDate.getMonth() === month;
      });

      const card = document.createElement("button");
      card.type = "button";
      card.className = "year-month";
      card.innerHTML = `
        <strong>${monthDate.toLocaleDateString("en-US", { month: "long" })}</strong>
        <span>${monthTasks.length} task${monthTasks.length === 1 ? "" : "s"}</span>
      `;
      card.addEventListener("click", () => {
        currentDate = monthDate;
        currentView = "month";
        setActiveView();
        renderCalendar();
      });
      calendarContent.appendChild(card);
    }
  }

  function setActiveView() {
    document.querySelectorAll(".view-tab").forEach((button) => {
      button.classList.toggle("is-active", button.dataset.view === currentView);
    });
  }

  function renderCalendar() {
    if (currentView === "week") renderWeek();
    if (currentView === "month") renderMonth();
    if (currentView === "year") renderYear();
  }

  document.querySelectorAll(".view-tab").forEach((button) => {
    button.addEventListener("click", () => {
      currentView = button.dataset.view;
      setActiveView();
      renderCalendar();
    });
  });

  document.getElementById("todayButton").addEventListener("click", () => {
    currentDate = new Date();
    renderCalendar();
  });

  document.getElementById("previousPeriod").addEventListener("click", () => {
    if (currentView === "week") currentDate.setDate(currentDate.getDate() - 7);
    if (currentView === "month") currentDate.setMonth(currentDate.getMonth() - 1);
    if (currentView === "year") currentDate.setFullYear(currentDate.getFullYear() - 1);
    renderCalendar();
  });

  document.getElementById("nextPeriod").addEventListener("click", () => {
    if (currentView === "week") currentDate.setDate(currentDate.getDate() + 7);
    if (currentView === "month") currentDate.setMonth(currentDate.getMonth() + 1);
    if (currentView === "year") currentDate.setFullYear(currentDate.getFullYear() + 1);
    renderCalendar();
  });

  document.addEventListener("tasksSynced", renderCalendar);
  document.addEventListener("tasksChanged", renderCalendar);
  renderCalendar();
</script>

</body>
</html>
