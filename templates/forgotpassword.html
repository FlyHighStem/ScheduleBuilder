<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Schedule Builder</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/shared.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/forgotpasswordstyle.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    {% include 'navbar.html' %}

    <div class="container">
        <div class="card">
            
            <div style="margin-bottom: 20px;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c48afb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <h1>Forgot Password</h1>

            <p class="subtitle">
                Enter your email and we'll send you a secure reset link to get you back on track.
            </p>

            <form action="/reset_password" method="POST">
                <label for="email">Email</label>

                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    placeholder="e.g., student@dvc.edu"
                    required
                >

                <button type="submit" class="btn btn-primary">Send Reset Link</button>
            </form>

            <a href="/" class="backlink">← Back to Sign In</a>

        </div>
    </div>

</body>
</html>
