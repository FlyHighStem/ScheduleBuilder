<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='forgotpasswordstyle.css') }}">
</head>

<body>
<div id="navbar"></div>
  <script>
        fetch("navbar.html")
        .then(response => response.text())
         .then(data => {
           document.getElementById("navbar").innerHTML = data;
          });
  </script>
  <br><br><br>
 <header class="header">
     <h1>Schedule Builder</h1>
     <img src="images/headerpic.png" alt="Logo" class="logo">
   
</header>
    <div class="container">
        <div class="card">

            <h1>Forgot Password</h1>

            <p class="subtitle">
                Enter your email and we'll send you a reset link.
            </p>

            <form>
                <label for="email">Email</label>

                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your email"
                    required
                >

                <button type="submit" class="btn btn-primary">Send Reset Link</button>
            </form>

            <a href="homepage.html" class="backlink">← Back to Sign In</a>

        </div>
    </div>

</body>
</html>
