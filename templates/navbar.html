<dialog class="modal" id="profileDialog">
  <form class="modal-card" id="profileForm">
    <div class="modal-header">
      <h2>Profile</h2>
      <button type="button" class="icon-button" data-close-dialog aria-label="Close">x</button>
    </div>

    <label for="profileName">Full Name</label>
    <input type="text" id="profileName" name="fullname" required>

    <label for="profileEmail">Email</label>
    <input type="email" id="profileEmail" name="email" required>

    <button type="submit" class="modal-submit">Save Profile</button>
  </form>
</dialog>

<dialog class="modal" id="settingsDialog">
  <form class="modal-card" id="settingsForm">
    <div class="modal-header">
      <h2>Settings</h2>
      <button type="button" class="icon-button" data-close-dialog aria-label="Close">x</button>
    </div>

    <label for="theme">Theme</label>
    <select id="theme" name="theme">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
    </select>

    <label class="checkbox-row">
      <input type="checkbox" name="reminders">
      Save reminder preference
    </label>

    <button type="submit" class="modal-submit">Save Settings</button>
  </form>
</dialog>
