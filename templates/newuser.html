<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='/newuserstyle.css') }}">
</head>
<body>
{% include 'navbar.html' %}
  <br><br><br>

   <header class="header">
     <h1>Schedule Builder</h1>
     <img src="images/headerpic.png" alt="Logo" class="logo">
   
</header>

  <main class="page">
    <section class="create-container">
      <div class="create-card">
        <h1>Create Account</h1>
        <p class="subtitle">Start building your schedule with help!</p>

        <form class="create-form" id="createAccountForm">
          <p class="notice" id="createNotice" hidden></p>

          <div class="input-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name">
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password">
          </div>

          <div class="input-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password">
          </div>

          <button type="submit" class="btn btn-primary create-btn">Create Account</button>
        </form>

        <p class="signin-text">
          Already have an account?
          <a href="/" class="link">Sign In</a>
        </p>
      </div>
    </section>
  </main>

  <script>
    const createAccountForm = document.getElementById("createAccountForm");
    const createNotice = document.getElementById("createNotice");

    createAccountForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const fullname = createAccountForm.fullname.value.trim();
      const email = createAccountForm.email.value.trim();
      const password = createAccountForm.password.value;
      const confirmPassword = createAccountForm["confirm-password"].value;

      if (!fullname || !email || !password) {
        showMessage(createNotice, "Fill out your name, email, and password.", true);
        return;
      }

      if (password !== confirmPassword) {
        showMessage(createNotice, "Passwords do not match.", true);
        return;
      }

      saveUser({ fullname, email, password, theme: "dark", reminders: true });
      window.location.href = "/dashboard";
    });
  </script>
</body>
</html>
