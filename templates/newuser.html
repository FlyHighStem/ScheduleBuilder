<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='newuserstyle.css') }}">
</head>
<body>
<div id="navbar"></div>
  <script>
        fetch("navbar.html")
        .then(response => response.text())
         .then(data => {
           document.getElementById("navbar").innerHTML = data;
          });
  </script>
  <br><br><br>

   <header class="header">
     <h1>Schedule Builder</h1>
     <img src="images/headerpic.png" alt="Logo" class="logo">
   
</header>

  <main class="page">
    <section class="create-container">
      <div class="create-card">
        <h1>Create Account</h1>
        <p class="subtitle">Start building your schedule with help!</p>

        <form class="create-form">
          <div class="input-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name">
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password">
          </div>

          <div class="input-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password">
          </div>

          <button type="submit" class="btn btn-primary create-btn">Create Account</button>
        </form>

        <p class="signin-text">
          Already have an account?
          <a href="homepage.html" class="link">Sign In</a>
        </p>
      </div>
    </section>
  </main>

</body>
</html>
